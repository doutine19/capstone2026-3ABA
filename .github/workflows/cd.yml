# CD 파이프라인: main 브랜치에 push 되면 자동 실행
name: CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      # 소스코드 가져오기
      - name: 소스코드 체크아웃
        uses: actions/checkout@v4

      # ☕ Java 설정 및 빌드 (이 단계가 추가되어야 합니다)
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 🔥 백엔드 JAR 파일 빌드
      - name: Build Backend with Maven
        run: |
          cd backend
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      # Docker Hub 로그인 (Secrets 사용)
      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 1. 백엔드 이미지 빌드
      - name: Backend Docker Build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:${{ github.sha }} ./backend
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest

      # 2. 프런트엔드 이미지 빌드
      - name: Frontend Docker Build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:${{ github.sha }} ./frontend
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest

      # 3. Docker Hub에 Push
      - name: Docker Hub Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-backend:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/yj-frontend:latest